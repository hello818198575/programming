<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progateクローン v3.0</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --header-h: 60px;
      --sidebar-w: 260px;
      --right-w: 310px;
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --primary: #6366f1;
      --primary2: #8b5cf6;
      --green: #10b981;
      --green2: #059669;
      --text: #1f2937;
      --muted: #6b7280;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff;
      box-shadow: 0 4px 18px rgba(99, 102, 241, 0.25);
    }

    #logo {
      font-size: 22px;
      font-weight: 800;
      display: flex;
      gap: 10px;
      align-items: center;
      white-space: nowrap;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      font-size: 14px;
    }

    #logout {
      border: 0;
      background: rgba(255,255,255,.18);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    #app {
      height: calc(100vh - var(--header-h));
      display: flex;
      min-height: 0;
    }

    #sidebar {
      width: var(--sidebar-w);
      background: #fff;
      border-right: 1px solid var(--line);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .course-card {
      padding: 18px 16px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
    }

    .course-card:hover {
      background: #f8fafc;
    }

    .course-card.active {
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff;
    }

    .course-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .course-progress {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      flex-shrink: 0;
    }

    #center {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #tabs {
      height: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .tab {
      border: 1px solid transparent;
      background: #f8fafc;
      color: #334155;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff;
      box-shadow: 0 8px 18px rgba(99, 102, 241, .22);
    }

    #content-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .view {
      display: none;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px;
    }

    .view.active {
      display: block;
    }

    .card {
      max-width: 920px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      border: 1px solid rgba(229,231,235,.9);
      box-shadow: 0 10px 34px rgba(15,23,42,.08);
      padding: 26px;
    }

    .slide-top {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .slide-icon {
      font-size: 44px;
      flex-shrink: 0;
    }

    .slide-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .slide-text {
      line-height: 1.8;
      color: #334155;
      font-size: 16px;
    }

    .slide-code {
      margin-top: 18px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      line-height: 1.7;
      overflow-x: auto;
    }

    .challenge-box {
      margin-top: 18px;
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border-left: 5px solid var(--green);
      border-radius: 14px;
      padding: 14px 16px;
      line-height: 1.8;
    }

    #code-editor {
      width: 100%;
      height: 220px;
      resize: vertical;
      border: 1px solid #dbe2ea;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #fff;
      outline: none;
    }

    #code-editor:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--green2));
      box-shadow: 0 8px 18px rgba(16,185,129,.24);
    }

    .btn.secondary {
      background: linear-gradient(135deg, #60a5fa, #2563eb);
    }

    .btn.gray {
      background: linear-gradient(135deg, #94a3b8, #64748b);
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      box-shadow: none;
    }

    #preview-frame {
      width: 100%;
      height: 320px;
      border: 0;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 8px 26px rgba(15,23,42,.10);
    }

    .terminal {
      background: #0b1220;
      color: #d1d5db;
      border-radius: 16px;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      min-height: 420px;
      box-shadow: 0 10px 34px rgba(15,23,42,.12);
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .terminal-line {
      margin-bottom: 8px;
    }

    .terminal-prompt {
      color: #4ade80;
    }

    #right {
      width: var(--right-w);
      background: #fff;
      border-left: 1px solid var(--line);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .panel {
      padding: 20px 16px;
      border-bottom: 1px solid #f1f5f9;
    }

    .panel h3 {
      font-size: 18px;
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
      margin: 12px 0 10px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), #34d399);
      transition: width .25s ease;
    }

    .hint-box {
      background: linear-gradient(135deg, #ecfdf5, #dcfce7);
      border-left: 4px solid var(--green);
      border-radius: 14px;
      padding: 14px;
      line-height: 1.8;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #fff;
      font-weight: 800;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.45);
      display: none;
      z-index: 90;
    }

    #result-popup {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(520px, 92vw);
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 24px 70px rgba(0,0,0,.24);
      display: none;
      z-index: 100;
      padding: 26px;
    }

    #result-popup.success { border: 2px solid #34d399; }
    #result-popup.error { border: 2px solid #f87171; }

    #result-icon {
      font-size: 54px;
      margin-bottom: 10px;
    }

    #result-diff {
      margin-top: 14px;
      background: #fef2f2;
      color: #991b1b;
      padding: 14px;
      border-radius: 12px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      max-height: 220px;
      overflow: auto;
      text-align: left;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="logo">🎯 Progateクローン v3.0</div>
    <div id="header-right">
      <div id="user-name">Guest</div>
      <div id="header-percent">0%</div>
      <button id="logout">ログアウト</button>
    </div>
  </div>

  <div id="overlay"></div>

  <div id="app">
    <div id="sidebar">
      <div class="course-card active" data-chapter="1">
        <div class="course-title">🌐 HTML基礎</div>
        <div class="course-progress"><span class="dot"></span><span>3/3 スライド</span></div>
      </div>
      <div class="course-card" data-chapter="2">
        <div class="course-title">🎨 CSS入門</div>
        <div class="course-progress"><span class="dot" style="opacity:.3;background:#94a3b8;"></span><span>0/3 スライド</span></div>
      </div>
      <div class="course-card" data-chapter="3">
        <div class="course-title">⚡ JavaScript</div>
        <div class="course-progress"><span class="dot" style="opacity:.3;background:#94a3b8;"></span><span>0/3 スライド</span></div>
      </div>
    </div>

    <div id="center">
      <div id="tabs">
        <button class="tab active" data-tab="slide">スライド</button>
        <button class="tab" data-tab="code">コード</button>
        <button class="tab" data-tab="preview">プレビュー</button>
        <button class="tab" data-tab="terminal">ターミナル</button>
      </div>

      <div id="content-wrap">
        <div class="view active" id="view-slide">
          <div class="card">
            <div class="slide-top">
              <div class="slide-icon" id="slide-icon">📘</div>
              <div>
                <div class="slide-title" id="slide-title">読み込み中...</div>
                <div class="slide-text" id="slide-text"></div>
              </div>
            </div>
            <div class="slide-code" id="slide-code"></div>
            <div class="challenge-box" id="challenge-box"></div>
          </div>
        </div>

        <div class="view" id="view-code">
          <div class="card">
            <textarea id="code-editor" placeholder="ここにコードを書いてください"></textarea>
            <div class="buttons">
              <button class="btn" id="run-code">✅ 実行・採点</button>
              <button class="btn secondary" id="next-slide" disabled>➡️ 次へ進む</button>
              <button class="btn gray" id="show-answer">💡 正解表示</button>
              <button class="btn gray" id="save-progress">💾 自動保存</button>
            </div>
          </div>
        </div>

        <div class="view" id="view-preview">
          <div class="card">
            <iframe id="preview-frame"></iframe>
          </div>
        </div>

        <div class="view" id="view-terminal">
          <div class="card">
            <div class="terminal" id="terminal-output"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="right">
      <div class="panel">
        <h3>📊 進捗</h3>
        <div class="progress-bar"><div class="progress-fill" id="main-progress"></div></div>
        <div id="step-counter">ステップ 1/3</div>
        <div class="badge" id="score-display">スコア: 0</div>
      </div>

      <div class="panel">
        <h3>💡 ヒント</h3>
        <div class="hint-box" id="hints-list"></div>
      </div>

      <div class="panel">
        <h3>🎖️ 実績</h3>
        <div class="hint-box">
          ✅ 初HTMLチャレンジ<br>
          ✅ 完璧クリア<br>
          ✅ 自動保存
        </div>
      </div>
    </div>
  </div>

  <div id="result-popup">
    <div id="result-icon">🎉</div>
    <h2 id="result-title">正解！</h2>
    <div id="result-message">素晴らしいです。</div>
    <div id="result-diff" style="display:none;"></div>
  </div>

  <script>
    const chapters = {
      1: {
        slides: [
          {
            icon: "📘",
            title: "見出しを作る",
            text: "スライドを読んで、コードを正確に入力してください。",
            code: "<h1>Hello World</h1>",
            hint: "・h1タグを使う\n・文字は Hello World\n・余計な空白を入れない",
            answer: "<h1>Hello World</h1>"
          },
          {
            icon: "✍️",
            title: "段落を追加する",
            text: "見出しの下に段落を追加します。",
            code: "<h1>Hello World</h1><p>First step!</p>",
            hint: "・h1はそのまま\n・pタグで段落を追加\n・文字を正確に書く",
            answer: "<h1>Hello World</h1><p>First step!</p>"
          },
          {
            icon: "🎨",
            title: "リストを作る",
            text: "順序付きリストを作ります。",
            code: "<h1>Menu</h1><ol><li>Item1</li><li>Item2</li></ol>",
            hint: "・olタグを使う\n・liを2つ書く\n・タグを正しく閉じる",
            answer: "<h1>Menu</h1><ol><li>Item1</li><li>Item2</li></ol>"
          }
        ]
      }
    };

    let currentChapterId = 1;
    let currentSlideIndex = 0;
    let totalScore = 0;
    let slideCleared = false;
    let currentTab = "slide";

    function saveKey() {
      return `progate-v3-${currentChapterId}`;
    }

    function normalizeCode(code) {
      return String(code || "")
        .replace(/\r\n/g, "\n")
        .trim()
        .replace(/\s+/g, " ")
        .replace(/>\s+</g, "><");
    }

    function showTab(tab) {
      currentTab = tab;
      $(".tab").removeClass("active");
      $(`.tab[data-tab="${tab}"]`).addClass("active");
      $(".view").removeClass("active");
      $(`#view-${tab}`).addClass("active");
    }

    function loadSavedState() {
      const raw = localStorage.getItem(saveKey());
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        if (typeof data.slideIndex === "number") currentSlideIndex = data.slideIndex;
        if (typeof data.totalScore === "number") totalScore = data.totalScore;
        if (typeof data.code === "string") $("#code-editor").val(data.code);
      } catch (e) {}
    }

    function autoSave() {
      localStorage.setItem(saveKey(), JSON.stringify({
        slideIndex: currentSlideIndex,
        totalScore,
        code: $("#code-editor").val(),
        savedAt: new Date().toISOString()
      }));
    }

    function updateUI() {
      const totalSlides = chapters[currentChapterId].slides.length;
      $("#step-counter").text(`ステップ ${currentSlideIndex + 1}/${totalSlides}`);
      $("#main-progress").css("width", `${((currentSlideIndex + 1) / totalSlides) * 100}%`);
      $("#score-display").text(`スコア: ${totalScore}`);
      $("#header-percent").text(`${Math.round(((currentSlideIndex + 1) / totalSlides) * 100)}%`);
    }

    function renderSlide() {
      const slide = chapters[currentChapterId].slides[currentSlideIndex];
      $("#slide-icon").text(slide.icon);
      $("#slide-title").text(slide.title);
      $("#slide-text").text(slide.text);
      $("#slide-code").text(slide.code);
      $("#challenge-box").html(`<strong>チャレンジ:</strong><br>上のコードをそのまま入力して、正解を目指そう。`);
      $("#hints-list").html(slide.hint.replace(/\n/g, "<br>"));
      $("#next-slide").prop("disabled", true);
      slideCleared = false;
      $("#terminal-output").html([
        `<div class="terminal-line"><span class="terminal-prompt">guest@codespace</span>:~$ npm start</div>`,
        `<div class="terminal-line">> learning platform started on port 3000</div>`,
        `<div class="terminal-line">> 現在のスライド: ${slide.title}</div>`
      ].join(""));
      $("#preview-frame").attr(
        "srcdoc",
        `<!doctype html><html><body style="font-family:sans-serif;padding:24px;color:#94a3b8;">プレビューはコード実行後に表示されます</body></html>`
      );
    }

    function openResult(success, message, diffHtml = "") {
      $("#overlay").show();
      $("#result-popup").show().removeClass("success error").addClass(success ? "success" : "error");
      $("#result-icon").text(success ? "🎉" : "❌");
      $("#result-title").text(success ? "正解！" : "間違いがあります");
      $("#result-message").text(message);
      if (success) {
        $("#result-diff").hide();
      } else {
        $("#result-diff").html(diffHtml).show();
      }
    }

    function closeResult() {
      $("#overlay").hide();
      $("#result-popup").hide();
    }

    function updatePreview() {
      const code = $("#code-editor").val();
      $("#preview-frame").attr(
        "srcdoc",
        `<!doctype html><html><body style="font-family:sans-serif;padding:24px;">${code || "<div style='color:#94a3b8;'>プレビューがここに出ます</div>"}</body></html>`
      );
    }

    function getDiffDisplay(user, correct) {
      const u = String(user || "").split("\n");
      const c = String(correct || "").split("\n");
      let html = "";
      const max = Math.max(u.length, c.length);
      for (let i = 0; i < max; i++) {
        const uu = u[i] ?? "";
        const cc = c[i] ?? "";
        if (uu.trim() !== cc.trim()) {
          html += `<div style="background:#fff1f2;color:#9f1239;padding:8px 10px;border-radius:8px;margin-bottom:8px;">${uu || "[行がありません]"}</div>`;
        } else {
          html += `<div style="background:#f0fdf4;color:#166534;padding:8px 10px;border-radius:8px;margin-bottom:8px;">${uu}</div>`;
        }
      }
      return html;
    }

    function checkAnswer() {
      const slide = chapters[currentChapterId].slides[currentSlideIndex];
      const userCode = $("#code-editor").val();
      const ok = normalizeCode(userCode) === normalizeCode(slide.answer);
      updatePreview();

      if (ok) {
        totalScore += 10;
        slideCleared = true;
        $("#next-slide").prop("disabled", false);
        updateUI();
        openResult(true, "素晴らしいです。次のスライドへ進めます。");
        $("#terminal-output").append(`
          <div class="terminal-line"><span class="terminal-prompt">guest@codespace</span>:~$ ✔ 採点成功</div>
          <div class="terminal-line">> 正解です。次へ進めます。</div>
        `);
      } else {
        openResult(false, "どこかに間違いがあります。タグ名、閉じタグ、文字列を確認してください。", getDiffDisplay(userCode, slide.answer));
        $("#terminal-output").append(`
          <div class="terminal-line"><span class="terminal-prompt">guest@codespace</span>:~$ ✖ 採点失敗</div>
          <div class="terminal-line">> 間違いがあります。コードを確認してください。</div>
        `);
      }
      autoSave();
    }

    function nextSlide() {
      if (!slideCleared) {
        alert("先に実行・採点してください。");
        return;
      }
      currentSlideIndex++;
      if (currentSlideIndex >= chapters[currentChapterId].slides.length) {
        currentSlideIndex = 0;
        alert("章クリアです。おつかれさまでした。");
      }
      renderSlide();
      updateUI();
      autoSave();
      showTab("slide");
    }

    function loadChapter(chapterId) {
      currentChapterId = chapterId;
      currentSlideIndex = 0;
      totalScore = 0;
      renderSlide();
      updateUI();
      autoSave();
      showTab("slide");
    }

    $(document).ready(function() {
      loadSavedState();
      renderSlide();
      updateUI();

      $(".tab").on("click", function() {
        showTab($(this).data("tab"));
      });

      $(".course-card").on("click", function() {
        $(".course-card").removeClass("active");
        $(this).addClass("active");
        loadChapter(Number($(this).data("chapter")));
      });

      $("#code-editor").on("input", function() {
        updatePreview();
        autoSave();
      });

      $("#run-code").on("click", checkAnswer);
      $("#next-slide").on("click", nextSlide);

      $("#show-answer").on("click", function() {
        const slide = chapters[currentChapterId].slides[currentSlideIndex];
        $("#code-editor").val(slide.answer);
        updatePreview();
        autoSave();
        showTab("code");
      });

      $("#save-progress").on("click", function() {
        autoSave();
        $("#terminal-output").append(`
          <div class="terminal-line"><span class="terminal-prompt">guest@codespace</span>:~$ ✓ save</div>
          <div class="terminal-line">> 自動保存しました。</div>
        `);
        alert("自動保存しました。");
      });

      $("#logout").on("click", function() {
        autoSave();
        alert("ログアウトしました。");
      });

      $("#overlay").on("click", closeResult);

      $(document).on("keydown", function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") checkAnswer();
        if (e.key === "Escape") closeResult();
      });

      updatePreview();
      autoSave();
    });
  </script>
</body>
</html>
